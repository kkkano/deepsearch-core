version: "3.9"

services:
  deepsearch:
    build: .
    image: deepsearch-core:latest
    container_name: deepsearch
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8765:8765"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

